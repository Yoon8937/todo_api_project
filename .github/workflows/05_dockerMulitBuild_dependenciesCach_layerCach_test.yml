name: 04 Docker Multi Build and use buildkit-cache-dance


on:
  workflow_dispatch:
#  push:
#    branches: ["main"]
#  pull_request:
#    branches: ["main"]


jobs:
  build-and-test:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      id: setup-buildxxx


    - name: dependencies build cache
      uses: actions/cache@v4
      id: cache
      with:
        path: m2-build-cache
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2-


    - name: inject m2-build-cache into docker
      uses: overmindtech/buildkit-cache-dance/inject@main
      with:
        cache-source: m2-build-cache


    - name: Build Dcoker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./dockerfile
        push: false
        tags: todoproject:latest
        cache-from: type=gha
        cache-to: type=gha, mode=max



    - name: extract m2-build-cache from docker
      uses: overmindtech/buildkit-cache-dance/extract@main
      with:
        cache-source: m2-build-cache

