name: 04 Docker Multi Build and use buildkit-cache-dance


on:
#  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]


jobs:
  build-and-test:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      id: setup-buildxxx


    - name: dependencies build cache
      uses: actions/cache@v4
      id: cache
      with:
        path: m2-repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2-

 


#    - name: Restore Docker cache mounts
#      uses: reproducible-containers/buildkit-cache-dance@v3
#      with:
#        cache-source: m2-repository
#        cache-target: /root/.m2/repository
#        builder: ${{ steps.setup-buildxxx.outputs.name }}
#        cache-dir: m2-repository
#        cache-map: |
#          {
#            "m2-repository" : "/root/.m2/repository"
#          }
#        dockerfile: ./dockerfile
#        skip-extraction: ${{ steps.cache.outputs.cache-hit }}


    - name: Restore Docker cache mounts
      uses: reproducible-containers/buildkit-cache-dance@v2.1.2
      with:
        cache-source: m2-repository
        cache-target: /root/.m2/repository


    - name: Build Dcoker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./dockerfile
        push: false
        tags: todoproject:latest
        cache-from: type=gha
        cache-to: type=gha, mode=max


    - name: checke dependencies
      run: |
        ls -al 
        ls -al m2-repository

           
           
