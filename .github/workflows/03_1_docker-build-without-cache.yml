name: 3-(1) Maven Build and Docker Build Without Cache


on:
  #  workflow_dispatch:

  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]


jobs:
  build-and-test:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4


    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
        #cache: 'maven' # Maven 의존성 캐싱


    # 3. Maven 빌드 및 jar 파일 생성
    - name: Build with Maven
      run: mvn clean package




    # 4. Docker Buildx 설정. Buildx는 멀티 아키텍처 빌드 가능, 빌드 속도 향상 등
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


   # 5. Dockerfile Buildd 
    - name: Build Dcoker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: todoproject:latest
     
